version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-runtime:
        patterns:
          - "next*"
          - "react*"
          - "framer-motion"
      quality-tooling:
        patterns:
          - "eslint*"
          - "typescript"
          - "vitest*"
          - "@testing-library/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
